name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run build

  cargo-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libssl-dev libgtk-3-dev
      - run: cd src-tauri && cargo check

  cli-regression:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Seed test data
        run: |
          mkdir -p "$HOME/.local/share/atomsyn/atoms/experience"
          mkdir -p "$HOME/.local/share/atomsyn/frameworks"
          cp -r data/atoms/* "$HOME/.local/share/atomsyn/atoms/" 2>/dev/null || true
          cp -r data/frameworks/* "$HOME/.local/share/atomsyn/frameworks/" 2>/dev/null || true
          cp -r data/index "$HOME/.local/share/atomsyn/index" 2>/dev/null || true
          cp -r data/taxonomy "$HOME/.local/share/atomsyn/taxonomy" 2>/dev/null || true
      - run: npm run test:cli
