<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Atomsyn · 个人元能力沉淀系统</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <script>
      // V1.5 · Hydrate theme before paint to avoid FOUC. Default LIGHT on
      // first launch; honor any previously-persisted zustand state (key
      // "ccl-app") or legacy "ccl-theme" key.
      try {
        var theme = 'light'
        var legacy = localStorage.getItem('ccl-theme')
        if (legacy === 'dark' || legacy === 'light') {
          theme = legacy
        } else {
          var raw = localStorage.getItem('ccl-app')
          if (raw) {
            var parsed = JSON.parse(raw)
            if (parsed && parsed.state && (parsed.state.theme === 'dark' || parsed.state.theme === 'light')) {
              theme = parsed.state.theme
            }
          }
        }
        document.documentElement.classList.toggle('dark', theme === 'dark')
      } catch (e) {}
    </script>
  </head>
  <body class="bg-neutral-50 dark:bg-[#0a0a0b]">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
